production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  refresh_invoice_sources:
    class: InvoiceSources::RefreshAllJob
    schedule: every 6 hours
  schedule_invoice_reminders:
    class: Account::InvoiceReminders::ScheduleJob
    schedule: every hour
  schedule_payment_promise_follow_ups:
    class: PaymentPromises::ScheduleFollowUpsJob
    schedule: every hour at minute 20
  reconcile_pending_conversation_messages:
    class: ConversationMessages::ReconcilePendingDeliveriesJob
    schedule: every hour at minute 40
  reconcile_invoice_reminder_notifications:
    class: InvoiceReminders::ReconcileNotificationDeliveriesJob
    schedule: every 15 minutes
  poll_gmail_inbound:
    class: EmailConnections::PollInboundJob
    schedule: every 15 minutes
  process_pending_gmail_receipts:
    class: EmailMessageReceipts::ProcessPendingJob
    schedule: every 15 minutes

# MySQL. Versions 5.6.4 and up are supported.
#
# Install the MySQL driver:
#   gem install mysql2
#
# Ensure the mysql2 gem is defined in your Gemfile:
#   gem "mysql2"
#
default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: root
  password:
  socket: /tmp/mysql.sock

development:
  <<: *default
  database: paid_jar_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: paid_jar_test

production:
  primary: &primary_production
    <<: *default
    database: paid_jar_production
    host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
    username: paid_jar
    password: <%= ENV["MYSQL_ROOT_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: paid_jar_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: paid_jar_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: paid_jar_production_cable
    migrations_paths: db/cable_migrate
